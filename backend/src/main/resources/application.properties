# ════════════════════════════════════════════════════════════
# SIPMS — Application Configuration
# ════════════════════════════════════════════════════════════

# ── Server ───────────────────────────────────────────────────
server.port=8080
server.address=0.0.0.0
spring.application.name=SIPMS

# ── MySQL Datasource ─────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/sipms_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:12345}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# ── JPA / Hibernate ─────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ── JWT Configuration ────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:SIPMS_Super_Secret_Key_2024_Must_Be_At_Least_256_Bits_Long_For_HS256_Algorithm_Security}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}

# ── File Upload Configuration ────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=./uploads

# ── CORS Configuration ──────────────────────────────────────
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:3000}

# ── Mail Configuration ───────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=ayadi9732@gmail.com
# Note: In production, use environment variable MAIL_PASSWORD
spring.mail.password=${MAIL_PASSWORD:placeholder}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Custom Email Settings
app.email.from=ayadi9732@gmail.com
app.email.enabled=true
app.login.url=http://localhost:5173


# ── AI / External Services Configuration ─────────────────────────────
# The external AI API key must be set via environment variable `API_KEY`.
# DO NOT commit or expose this key in source control.
ai.enabled=${AI_ENABLED:true}
ai.api.key=${API_KEY:}
ai.default.model=${AI_MODEL:gpt-4-mini}

# ── Swagger / OpenAPI ────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ── Health Check ───────────────��───────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ── Rate Limiting ───────────────────────────────────────
app.rate-limit.max-requests=100
app.rate-limit.window-ms=60000

# ── Logging ──────────────────────────────────────────────────
logging.level.com.project.sipms=DEBUG
logging.level.com.project.sipms.controller.AuthController=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n
