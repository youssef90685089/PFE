# ════════════════════════════════════════════════════════════
# SIPMS — Production Configuration
# ════════════════════════════════════════════════════════════

server.port=8080
spring.application.name=SIPMS

# ── MySQL Datasource (Production Optimized) ─────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/sipms_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true&cachePrepStmts=true&prepStmtCacheSize=250&prepStmtCacheSqlLimit=2048
spring.datasource.username=root
spring.datasource.password=12345
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP Connection Pool Settings
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000

# ── JPA / Hibernate (Production Hardened) ───────────────────
# NEVER use update/create in prod. Validate only to prevent accidental schema drops.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# Batch Processing for High Throughput
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ── JWT Configuration (Secure Secrets) ──────────────────────
# In a real environment, inject via environment variables (${JWT_SECRET})
app.jwt.secret=${JWT_SECRET:SIPMS_Production_Secret_Key_2026_Must_Be_At_Least_256_Bits_Long_For_HS256_Algorithm_Security}
app.jwt.expiration-ms=3600000
app.jwt.refresh-expiration-ms=604800000

# ── File Upload Configuration ────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
app.upload.dir=./uploads

# ── CORS Configuration ──────────────────────────────────────
# Restrict to production domains
app.cors.allowed-origins=${FRONTEND_URL:http://localhost:5173}

# ── Logging (Production Quiet) ────────────────────────────────
logging.level.root=WARN
logging.level.com.project.sipms=INFO
# logging.file.name=logs/sipms-prod.log
